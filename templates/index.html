<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyForge 🧠</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eaeaea;
            line-height: 1.6;
            display: flex;
            height: 100vh;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 2px solid #0f3460;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0f3460;
        }

        .sidebar-logo {
            font-size: 2rem;
            font-weight: 900;
            color: #e94560;
            margin-bottom: 8px;
        }

        .sidebar-title {
            font-size: 0.9rem;
            color: #b0b0b0;
        }

        .nav-section {
            margin-bottom: 30px;
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            font-size: 0.95rem;
            border: 2px solid transparent;
        }

        .nav-item:hover {
            background: #0f3460;
            border-color: #e94560;
        }

        .nav-item.active {
            background: #e94560;
            color: #1a1a2e;
            font-weight: 600;
        }

        .sidebar-stats {
            margin-top: auto;
            padding-top: 20px;
            border-top: 2px solid #0f3460;
            font-size: 0.85rem;
            color: #b0b0b0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #e94560;
            font-weight: 600;
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* ==================== DASHBOARD PAGE ==================== */
        .dashboard-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .app-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-subtitle {
            font-size: 1rem;
            color: #b0b0b0;
        }

        .modes-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .mode-card {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .mode-card:hover {
            border-color: #e94560;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.2);
        }

        .mode-card-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #e94560;
        }

        .mode-card-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 0.95rem;
            color: #b0b0b0;
            border-bottom: 1px solid #0f3460;
        }

        .mode-card-stat:last-of-type {
            border-bottom: none;
        }

        .mode-card-stat-value {
            color: #eaeaea;
            font-weight: 600;
        }

        .progress-bar {
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            margin: 16px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #e94560 100%);
            transition: width 0.3s ease;
        }

        .mode-card-button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: #0f3460;
            border: none;
            color: #eaeaea;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-card-button:hover {
            background: #e94560;
            transform: scale(1.02);
        }

        /* ==================== STUDY PAGE ==================== */
        .study-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0f3460;
        }

        .study-info {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .study-mode {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e94560;
        }

        .study-progress-text {
            font-size: 0.95rem;
            color: #b0b0b0;
        }

        .back-btn {
            background: none;
            border: none;
            color: #b0b0b0;
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 8px 16px;
            border-radius: 6px;
        }

        .back-btn:hover {
            color: #e94560;
            background: #0f3460;
        }

        .session-progress-bar {
            height: 8px;
            background: #0f3460;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .session-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #e94560 100%);
        }

        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
        }

        .card-box {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-question {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .card-code {
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 6px;
            padding: 16px;
            margin: 20px 0;
            overflow-x: auto;
        }

        .card-code pre {
            margin: 0;
            font-size: 0.85rem;
        }

        .card-hint {
            background: #0f3460;
            padding: 12px 16px;
            border-left: 4px solid #fb923c;
            border-radius: 4px;
            font-style: italic;
            color: #b0b0b0;
            margin: 16px 0;
            display: none;
        }

        .card-hint.visible {
            display: block;
        }

        .card-controls {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-hint {
            background: #0f3460;
            color: #fb923c;
        }

        .btn-hint:hover {
            background: #fb923c;
            color: #1a1a2e;
        }

        .btn-flip {
            background: #e94560;
            color: #eaeaea;
            flex: 2;
        }

        .btn-flip:hover {
            background: #ff6b7f;
        }

        .card-answer {
            background: #0f3460;
            border-top: 2px solid #e94560;
            padding: 20px;
            margin-top: 20px;
            border-radius: 6px;
            display: none;
        }

        .card-answer.visible {
            display: block;
        }

        .card-answer-text {
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            border-bottom: 2px solid #16213e;
            padding-bottom: 16px;
        }

        .mode-toggle-btn {
            flex: 1;
            padding: 10px;
            background: #16213e;
            border: 2px solid #0f3460;
            color: #b0b0b0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .mode-toggle-btn.active {
            background: #e94560;
            color: #eaeaea;
            border-color: #e94560;
        }

        .quick-rate {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .rate-btn {
            padding: 12px;
            background: #16213e;
            border: 2px solid #0f3460;
            color: #eaeaea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .rate-btn:hover {
            transform: scale(1.05);
        }

        .rate-btn.again { border-color: #e94560; color: #e94560; }
        .rate-btn.again:hover { background: #e94560; color: #eaeaea; }
        .rate-btn.hard { border-color: #fb923c; color: #fb923c; }
        .rate-btn.hard:hover { background: #fb923c; color: #eaeaea; }
        .rate-btn.good { border-color: #4ade80; color: #4ade80; }
        .rate-btn.good:hover { background: #4ade80; color: #eaeaea; }
        .rate-btn.easy { border-color: #0f3460; color: #0f3460; }
        .rate-btn.easy:hover { background: #0f3460; color: #eaeaea; }

        .deep-mode {
            display: none;
        }

        .deep-mode.visible {
            display: block;
        }

        .deep-mode textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            background: #16213e;
            border: 2px solid #0f3460;
            color: #eaeaea;
            border-radius: 6px;
            font-family: monospace;
            margin-bottom: 12px;
            resize: vertical;
        }

        .btn-evaluate {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            border: 2px solid #e94560;
            color: #e94560;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-evaluate:hover {
            background: #e94560;
            color: #eaeaea;
        }

        /* ==================== COMPLETE PAGE ==================== */
        .complete-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .complete-header {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 30px;
            color: #4ade80;
        }

        .complete-summary {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            margin-bottom: 30px;
        }

        .summary-stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 1.1rem;
        }

        .summary-stat:last-child {
            border-bottom: none;
        }

        .summary-stat-label {
            color: #b0b0b0;
        }

        .summary-stat-value {
            color: #e94560;
            font-weight: 700;
        }

        .complete-breakdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .breakdown-item {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 8px;
            padding: 16px;
        }

        .breakdown-label {
            font-size: 0.85rem;
            color: #b0b0b0;
            margin-bottom: 8px;
        }

        .breakdown-count {
            font-size: 2rem;
            font-weight: 900;
        }

        .breakdown-again .breakdown-count { color: #e94560; }
        .breakdown-hard .breakdown-count { color: #fb923c; }
        .breakdown-good .breakdown-count { color: #4ade80; }
        .breakdown-easy .breakdown-count { color: #0f3460; }

        .complete-buttons {
            display: flex;
            gap: 16px;
            max-width: 500px;
        }

        .btn-primary {
            flex: 1;
            padding: 16px 24px;
            background: #e94560;
            border: none;
            color: #eaeaea;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #ff6b7f;
        }

        .btn-secondary {
            flex: 1;
            padding: 16px 24px;
            background: #0f3460;
            border: 2px solid #e94560;
            color: #e94560;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #e94560;
            color: #eaeaea;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #b0b0b0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #0f3460;
            border-top: 3px solid #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ==================== MOBILE HEADER ==================== */
        .mobile-header {
            display: none;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 150;
        }

        .sidebar-overlay.visible {
            display: block;
        }

        /* ==================== RESPONSIVE: <= 768px ==================== */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* Mobile sticky top bar */
            .mobile-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 16px;
                background: #16213e;
                border-bottom: 2px solid #0f3460;
                position: sticky;
                top: 0;
                z-index: 100;
                flex-shrink: 0;
            }

            .mobile-logo {
                font-size: 1.15rem;
                font-weight: 900;
                color: #e94560;
            }

            .hamburger-btn {
                background: none;
                border: 1px solid #0f3460;
                color: #eaeaea;
                font-size: 1.3rem;
                padding: 5px 12px;
                border-radius: 4px;
                cursor: pointer;
                line-height: 1;
                transition: border-color 0.2s;
            }

            .hamburger-btn:hover {
                border-color: #e94560;
                color: #e94560;
            }

            /* Sidebar becomes a fixed slide-in drawer */
            .sidebar {
                position: fixed;
                top: 0;
                left: -300px;
                width: 260px;
                height: 100%;
                z-index: 200;
                transition: left 0.28s ease;
                border-right: 2px solid #0f3460;
                border-bottom: none;
            }

            .sidebar.open {
                left: 0;
            }

            /* Main content fills full width */
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 16px 12px;
                overflow-x: hidden;
            }

            /* Dashboard */
            .app-title { font-size: 2rem; }

            .modes-container {
                grid-template-columns: 1fr;
            }

            /* Deck buttons stack on narrow phones */
            .deck-btn-row {
                flex-wrap: wrap;
            }

            /* Study header wraps */
            .study-header {
                flex-wrap: wrap;
                gap: 8px;
            }

            .study-info {
                gap: 12px;
                flex-wrap: wrap;
            }

            /* Card container: no fixed height */
            .card-container {
                min-height: auto;
                align-items: flex-start;
            }

            .card-box {
                padding: 20px 16px;
            }

            /* Rating buttons: 2-column grid */
            .quick-rate {
                grid-template-columns: repeat(2, 1fr);
            }

            /* Nav control buttons wrap */
            .nav-controls {
                flex-wrap: wrap;
            }

            .btn-finish {
                flex: 1 1 100%;
                order: 3;
            }

            /* Code blocks scroll horizontally, never break layout */
            .card-code {
                max-width: 100%;
                overflow-x: auto;
            }

            pre, code {
                max-width: 100%;
                white-space: pre;
                overflow-x: auto;
                word-break: normal;
            }

            /* Session complete breakdown: 2-column */
            .complete-breakdown {
                grid-template-columns: repeat(2, 1fr);
            }

            .complete-buttons {
                flex-direction: column;
                width: 100%;
                max-width: 100%;
            }

            /* Chat indentation reduced */
            .chat-message.user      { margin-left: 4%; }
            .chat-message.assistant { margin-right: 4%; }

            /* Textarea & chat input: always full width */
            .deep-mode textarea,
            .chat-input {
                width: 100%;
            }
        }

        /* ==================== RESPONSIVE: <= 480px ==================== */
        @media (max-width: 480px) {
            .app-title { font-size: 1.6rem; }

            .dashboard-header { margin-bottom: 28px; }

            .card-question { font-size: 1.15rem; }

            .mode-card { padding: 16px 14px; }

            .card-box { padding: 14px 12px; }

            .complete-header { font-size: 2rem; }

            .complete-summary { padding: 24px 16px; }

            /* Touch-friendly button height */
            .btn,
            .btn-nav,
            .rate-btn,
            .btn-deck-start,
            .btn-deck-reset,
            .mode-card-button,
            .btn-primary,
            .btn-secondary {
                min-height: 44px;
            }

            /* Deck action buttons: full width stack */
            .deck-btn-row {
                flex-direction: column;
            }

            .btn-deck-start,
            .btn-deck-reset {
                flex: 1 1 auto;
            }

            /* Nav controls: Prev / Next full row, Finish below */
            .btn-nav { font-size: 0.85rem; }
        }

        /* ==================== RATING FEEDBACK ==================== */
        .rating-saved-msg {
            background: rgba(74, 222, 128, 0.08);
            border-left: 4px solid #4ade80;
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 12px;
            color: #4ade80;
            font-size: 0.9rem;
        }

        .rating-error-msg {
            background: rgba(233, 69, 96, 0.08);
            border-left: 4px solid #e94560;
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 12px;
            color: #e94560;
            font-size: 0.9rem;
        }

        /* ==================== RATE BUTTON STATES ==================== */
        .rate-btn.again.selected  { background: #e94560; color: #eaeaea; }
        .rate-btn.hard.selected   { background: #fb923c; color: #eaeaea; }
        .rate-btn.good.selected   { background: #4ade80; color: #1a1a2e; }
        .rate-btn.easy.selected   { background: #0f3460; color: #eaeaea; border-color: #4ade80; }
        .rate-btn.dimmed          { opacity: 0.35; }
        .rate-btn.selected        { transform: scale(1.05); font-weight: 700; }

        /* ==================== EVALUATION BOX ==================== */
        .eval-box {
            background: #0f3460;
            border-radius: 6px;
            padding: 16px;
            margin-top: 12px;
        }
        .eval-score        { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
        .eval-feedback     { color: #eaeaea; margin-bottom: 8px; line-height: 1.5; }
        .eval-missed-label { color: #fb923c; font-weight: 600; margin-bottom: 4px; }
        .eval-missed-list  { color: #b0b0b0; padding-left: 20px; }
        .eval-missed-list li { margin-bottom: 4px; }

        /* ==================== NAVIGATION CONTROLS ==================== */
        .nav-controls {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid #0f3460;
        }

        .btn-nav {
            flex: 1;
            padding: 12px;
            border: 2px solid #0f3460;
            background: #16213e;
            color: #eaeaea;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-nav:hover:not(:disabled) {
            background: #0f3460;
            border-color: #e94560;
            color: #e94560;
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-next {
            background: #e94560;
            border-color: #e94560;
            color: #eaeaea;
        }

        .btn-next:hover:not(:disabled) {
            background: #ff6b7f;
            border-color: #ff6b7f;
            color: #eaeaea;
        }

        .btn-finish {
            flex: 0.8;
            background: #16213e;
            border-color: #fb923c;
            color: #fb923c;
        }

        .btn-finish:hover {
            background: #fb923c;
            color: #eaeaea;
        }

        /* ==================== CHAT SECTION ==================== */
        .chat-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #0f3460;
        }

        .chat-title {
            color: #e94560;
            margin-bottom: 12px;
            font-size: 1rem;
            font-weight: 700;
        }

        .chat-quick-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .chat-quick-btn {
            padding: 5px 12px;
            background: #0f3460;
            border: 1px solid #e94560;
            color: #e94560;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s ease;
        }

        .chat-quick-btn:hover {
            background: #e94560;
            color: #eaeaea;
        }

        .chat-history {
            max-height: 280px;
            overflow-y: auto;
            background: #1a1a2e;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #0f3460;
        }

        .chat-empty {
            color: #555;
            font-style: italic;
            font-size: 0.85rem;
            text-align: center;
            padding: 8px 0;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .chat-message:last-child { margin-bottom: 0; }

        .chat-message.user {
            background: #0f3460;
            margin-left: 12%;
            border-bottom-right-radius: 2px;
        }

        .chat-message.assistant {
            background: #16213e;
            border: 1px solid #0f3460;
            margin-right: 12%;
            border-bottom-left-radius: 2px;
        }

        .chat-role {
            font-size: 0.72rem;
            color: #888;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-content {
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 12px;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            color: #eaeaea;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: border-color 0.2s ease;
        }

        .chat-input:focus {
            border-color: #e94560;
            outline: none;
        }

        .btn-send {
            padding: 10px 20px;
            background: #e94560;
            border: none;
            color: #eaeaea;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-send:hover:not(:disabled) { background: #ff6b7f; }

        .btn-send:disabled,
        .btn-evaluate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== DASHBOARD DECK BUTTONS ==================== */
        .deck-btn-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .btn-deck-start {
            flex: 2;
            padding: 12px;
            background: #0f3460;
            border: none;
            color: #eaeaea;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-deck-start:hover { background: #e94560; }

        .btn-deck-reset {
            flex: 1;
            padding: 12px;
            background: #1a1a2e;
            border: 2px solid #e94560;
            color: #e94560;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-deck-reset:hover {
            background: #e94560;
            color: #eaeaea;
        }
    </style>
</head>
<body>
    <!-- Mobile top bar (hidden on desktop) -->
    <header class="mobile-header" id="mobileHeader">
        <div class="mobile-logo">🧠 StudyForge</div>
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Open menu">☰</button>
    </header>

    <!-- Overlay that dims the page when sidebar drawer is open -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🧠</div>
            <div class="sidebar-title">StudyForge</div>
        </div>
        <div class="nav-section">
            <div class="nav-label">Main</div>
            <div class="nav-item active" onclick="navigateTo('dashboard')">📊 Dashboard</div>
        </div>
        <div class="nav-section" id="study-nav" style="display: none;">
            <div class="nav-label">Study</div>
            <div class="nav-item" onclick="navigateTo('study')">📚 Study Session</div>
            <div class="nav-item" onclick="navigateTo('dashboard')">↩️ Back to Dashboard</div>
        </div>
        <div class="sidebar-stats">
            <div class="stat-row"><span>Total Cards:</span><span class="stat-value" id="sidebar-total">0</span></div>
            <div class="stat-row"><span>Due Today:</span><span class="stat-value" id="sidebar-due">0</span></div>
            <div class="stat-row"><span>Mastered:</span><span class="stat-value" id="sidebar-mastered">0</span></div>
        </div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="page active">
            <div class="dashboard-header">
                <h1 class="app-title">StudyForge 🧠</h1>
                <p class="app-subtitle">Spaced Repetition for Java Core · LLD · HLD</p>
            </div>
            <div class="modes-container" id="modesContainer">
                <div class="loading"><span class="spinner"></span> Loading...</div>
            </div>
        </div>

        <div id="study" class="page">
            <div class="study-header">
                <button class="back-btn" onclick="navigateTo('dashboard')">← Back</button>
                <div class="study-info">
                    <span class="study-mode" id="sessionMode"></span>
                    <span class="study-progress-text">Card <span id="currentCardNum">1</span>/<span id="totalCards">0</span></span>
                </div>
            </div>
            <div class="session-progress-bar">
                <div class="session-progress-fill" id="sessionProgressFill"></div>
            </div>
            <div class="card-container">
                <div class="card-box" id="cardBox"></div>
            </div>
        </div>

        <div id="complete" class="page">
            <div class="complete-container">
                <div class="complete-header">🎉 Session Complete!</div>
                <div class="complete-summary">
                    <div class="summary-stat"><span>Cards Reviewed</span><span class="summary-stat-value" id="completeReviewed">0</span></div>
                    <div class="summary-stat"><span>Average Quality</span><span class="summary-stat-value" id="completeAverage">0.0</span></div>
                    <div class="summary-stat"><span>Time Taken</span><span class="summary-stat-value" id="completeTime">0m</span></div>
                </div>
                <div class="complete-breakdown">
                    <div class="breakdown-item breakdown-again"><div class="breakdown-label">Again</div><div class="breakdown-count" id="breakdownAgain">0</div></div>
                    <div class="breakdown-item breakdown-hard"><div class="breakdown-label">Hard</div><div class="breakdown-count" id="breakdownHard">0</div></div>
                    <div class="breakdown-item breakdown-good"><div class="breakdown-label">Good</div><div class="breakdown-count" id="breakdownGood">0</div></div>
                    <div class="breakdown-item breakdown-easy"><div class="breakdown-label">Easy</div><div class="breakdown-count" id="breakdownEasy">0</div></div>
                </div>
                <div class="complete-buttons">
                    <button class="btn-primary" onclick="state.restartSession()">Study Again</button>
                    <button class="btn-secondary" onclick="navigateTo('dashboard')">← Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== UTILITY ====================
        function esc(text) {
            if (text == null) return '';
            const m = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return String(text).replace(/[&<>"']/g, c => m[c]);
        }

        function formatTime(ms) {
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            return min === 0 ? `${sec}s` : `${min}m ${sec}s`;
        }

        function getModeDisplay(mode) {
            const m = {'java_core': 'Java Core', 'lld': 'LLD Patterns', 'hld': 'HLD Concepts'};
            return m[mode] || mode.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        // ==================== STATE ====================
        const state = {
            currentMode: null,
            session: [],
            currentIndex: 0,
            cardStates: {},   // keyed by card.id — persists per-card state within session
            startTime: null,

            getCardState(cardId) {
                if (!this.cardStates[cardId]) {
                    this.cardStates[cardId] = {
                        rating: null,
                        answerResponse: null,
                        userAnswer: '',
                        evaluation: null,
                        chat: [],
                        saved: false,
                        error: null,
                        selectedRating: null,
                        flipped: false,
                        deepMode: false
                    };
                }
                return this.cardStates[cardId];
            },

            // Count unique cards that have been rated or evaluated
            getReviewedCount() {
                return Object.values(this.cardStates).filter(
                    cs => cs.selectedRating !== null || cs.evaluation !== null
                ).length;
            },

            restartSession() { this.startSession(this.currentMode); },

            async startSession(mode) {
                this.currentMode = mode;
                this.session = [];
                this.currentIndex = 0;
                this.cardStates = {};
                this.startTime = Date.now();

                navigateTo('study');
                document.getElementById('sessionMode').textContent = getModeDisplay(mode);
                document.getElementById('study-nav').style.display = 'block';

                try {
                    const resp = await fetch(`/api/session/${mode}`);
                    if (!resp.ok) throw new Error('Failed to load session');
                    this.session = await resp.json();
                    if (this.session.length === 0) {
                        alert('No cards due for this mode!');
                        navigateTo('dashboard');
                        return;
                    }
                    document.getElementById('totalCards').textContent = this.session.length;
                    this.renderCard();
                } catch (err) {
                    alert('Error: ' + err.message);
                    navigateTo('dashboard');
                }
            },

            renderCard() {
                const card = this.session[this.currentIndex];
                const cs = this.getCardState(card.id);
                document.getElementById('currentCardNum').textContent = this.currentIndex + 1;

                // Code block
                const codeHtml = card.code
                    ? `<div class="card-code"><pre><code>${esc(card.code)}</code></pre></div>`
                    : '';

                // Rate buttons with selected/dimmed state
                const ratingDefs = [
                    {q: 0, cls: 'again', label: '🔴 Again'},
                    {q: 3, cls: 'hard',  label: '🟠 Hard'},
                    {q: 4, cls: 'good',  label: '🟢 Good'},
                    {q: 5, cls: 'easy',  label: '🔵 Easy'}
                ];
                const hasSelection = cs.selectedRating !== null;
                const quickRateHtml = ratingDefs.map(({q, cls, label}) => {
                    const isSelected = cs.selectedRating === q;
                    const extra = isSelected ? ' selected' : (hasSelection ? ' dimmed' : '');
                    return `<button class="rate-btn ${cls}${extra}" onclick="submitRating(${q})">${label}</button>`;
                }).join('');

                // Saved / error message
                let savedMsgHtml = '';
                if (cs.saved && cs.answerResponse) {
                    savedMsgHtml = `<div class="rating-saved-msg">✓ Rating saved. Next review: ${esc(cs.answerResponse.next_review)}. Use Next → to continue.</div>`;
                } else if (cs.error) {
                    savedMsgHtml = `<div class="rating-error-msg">⚠ ${esc(cs.error)}</div>`;
                }

                // Evaluation result
                const evalHtml = cs.evaluation ? buildEvalHtml(cs.evaluation) : '';

                // Chat history
                const chatHistoryHtml = buildChatHistoryHtml(cs.chat);

                // "Why wrong?" quick button only if there's a submitted answer
                const whyWrongBtn = cs.userAnswer
                    ? `<button class="chat-quick-btn" onclick="sendQuickChat('Why is my answer wrong or incomplete? What key points did I miss?')">Why wrong?</button>`
                    : '';

                // Answer section visibility
                const answerVisible = cs.flipped || cs.saved || cs.evaluation !== null;
                const deepVisible   = cs.deepMode;
                const flipLabel     = answerVisible ? 'Hide Answer' : 'Show Answer';

                const boxHtml = `
                    <div class="card-question">${esc(card.question)}</div>
                    ${codeHtml}
                    <div class="card-hint" id="hintBox">${esc(card.hint || 'No hint available')}</div>
                    <div class="card-controls">
                        <button class="btn btn-hint" onclick="toggleHint()">📌 Hint</button>
                        <button class="btn btn-flip" id="flipBtn" onclick="flipCard()">${flipLabel}</button>
                    </div>

                    <div class="card-answer${answerVisible ? ' visible' : ''}" id="answerSection">
                        <div class="card-answer-text">${esc(card.answer)}</div>

                        <div class="mode-toggle">
                            <button class="mode-toggle-btn${!deepVisible ? ' active' : ''}" onclick="setDeepMode(false)">Quick Rate</button>
                            <button class="mode-toggle-btn${deepVisible  ? ' active' : ''}" onclick="setDeepMode(true)">Deep Mode (AI)</button>
                        </div>

                        <div class="quick-rate" id="quickRate" style="display:${deepVisible ? 'none' : 'grid'}">${quickRateHtml}</div>

                        <div id="savedMsg">${savedMsgHtml}</div>

                        <div class="deep-mode${deepVisible ? ' visible' : ''}" id="deepMode">
                            <textarea id="userAnswer" placeholder="Type your answer here...">${esc(cs.userAnswer)}</textarea>
                            <button class="btn-evaluate" id="evalBtn" onclick="evaluateWithAI()">🤖 Evaluate with AI</button>
                            <div id="evaluationResult">${evalHtml}</div>

                            <div class="chat-section">
                                <h4 class="chat-title">💬 Discuss with AI Tutor</h4>
                                <div class="chat-quick-btns">
                                    <button class="chat-quick-btn" onclick="sendQuickChat('Explain this in simpler terms')">Explain simply</button>
                                    <button class="chat-quick-btn" onclick="sendQuickChat('Give me a real-world example for this concept')">Give example</button>
                                    <button class="chat-quick-btn" onclick="sendQuickChat('Ask me a harder follow-up interview question on this topic')">Interview Q</button>
                                    ${whyWrongBtn}
                                </div>
                                <div class="chat-history" id="chatHistory">${chatHistoryHtml}</div>
                                <div class="chat-input-row">
                                    <input class="chat-input" id="chatInput" type="text"
                                        placeholder="Ask a follow-up question..."
                                        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage();}">
                                    <button class="btn-send" id="sendBtn" onclick="sendChatMessage()">Send</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="nav-controls">
                        <button class="btn-nav btn-prev" onclick="state.previousCard()"
                            ${this.currentIndex === 0 ? 'disabled' : ''}>← Prev</button>
                        <button class="btn-nav btn-finish" onclick="state.finishSession()">⏹ Finish</button>
                        <button class="btn-nav btn-next" onclick="state.goToNextCard()">
                            ${this.currentIndex === this.session.length - 1 ? 'Complete ✓' : 'Next →'}
                        </button>
                    </div>
                `;

                document.getElementById('cardBox').innerHTML = boxHtml;

                if (card.code) {
                    setTimeout(() => {
                        document.querySelectorAll('.card-code code').forEach(b => hljs.highlightElement(b));
                    }, 0);
                }

                // Scroll chat to bottom if there are messages
                if (cs.chat.length > 0) {
                    const ch = document.getElementById('chatHistory');
                    if (ch) ch.scrollTop = ch.scrollHeight;
                }

                updateProgressBar();
            },

            // Save textarea before navigating away from a card
            _saveTextarea() {
                if (!this.session.length) return;
                const card = this.session[this.currentIndex];
                const ta = document.getElementById('userAnswer');
                if (ta) this.getCardState(card.id).userAnswer = ta.value;
            },

            previousCard() {
                if (this.currentIndex <= 0) return;
                this._saveTextarea();
                this.currentIndex--;
                this.renderCard();
            },

            goToNextCard() {
                this._saveTextarea();
                if (this.currentIndex >= this.session.length - 1) {
                    this.completeSession();
                } else {
                    this.currentIndex++;
                    this.renderCard();
                }
            },

            finishSession() {
                this._saveTextarea();
                this.completeSession();
            },

            completeSession() {
                const stats = this.calculateStats();
                document.getElementById('completeReviewed').textContent = stats.reviewed;
                document.getElementById('completeAverage').textContent = stats.avgQuality.toFixed(1);
                document.getElementById('completeTime').textContent = formatTime(stats.timeMs);
                document.getElementById('breakdownAgain').textContent = stats.counts[0];
                document.getElementById('breakdownHard').textContent  = stats.counts[3];
                document.getElementById('breakdownGood').textContent  = stats.counts[4];
                document.getElementById('breakdownEasy').textContent  = stats.counts[5];
                navigateTo('complete');
            },

            calculateStats() {
                const ratings = [];
                Object.values(this.cardStates).forEach(cs => {
                    if (cs.selectedRating !== null) {
                        ratings.push(cs.selectedRating);
                    } else if (cs.evaluation !== null) {
                        ratings.push(cs.evaluation.score || 0);
                    }
                });
                const timeMs = Date.now() - (this.startTime || Date.now());
                if (ratings.length === 0) return { reviewed: 0, avgQuality: 0, timeMs, counts: [0,0,0,0,0,0] };
                const sum = ratings.reduce((a, q) => a + q, 0);
                const counts = [0,0,0,0,0,0];
                ratings.forEach(q => { counts[Math.min(5, Math.max(0, q))]++; });
                return { reviewed: ratings.length, avgQuality: sum / ratings.length, timeMs, counts };
            }
        };

        // ==================== MOBILE SIDEBAR DRAWER ====================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen  = sidebar.classList.toggle('open');
            overlay.classList.toggle('visible', isOpen);
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
        }

        // ==================== PAGE NAVIGATION ====================
        function navigateTo(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
            if (pageName === 'dashboard') {
                document.getElementById('study-nav').style.display = 'none';
                loadDashboard();
            }
            closeSidebar();  // always close mobile drawer on any navigation
            window.scrollTo(0, 0);
        }

        // ==================== DASHBOARD ====================
        async function loadDashboard() {
            const container = document.getElementById('modesContainer');
            try {
                const resp = await fetch('/api/stats');
                const stats = await resp.json();
                let html = '', total = 0, due = 0, mastered = 0;

                for (const [mode, data] of Object.entries(stats)) {
                    const pct = data.total > 0 ? (data.mastered / data.total) * 100 : 0;
                    html += `<div class="mode-card">
                        <div class="mode-card-title">${esc(data.name)}</div>
                        <div class="mode-card-stat"><span>Total</span><span class="mode-card-stat-value">${data.total}</span></div>
                        <div class="mode-card-stat"><span>Due Today</span><span class="mode-card-stat-value">${data.due_today}</span></div>
                        <div class="mode-card-stat"><span>Mastered</span><span class="mode-card-stat-value">${data.mastered}</span></div>
                        <div class="mode-card-stat"><span>Unseen</span><span class="mode-card-stat-value">${data.unseen}</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                        <div class="deck-btn-row">
                            <button class="btn-deck-start" data-mode="${mode}" onclick="state.startSession(this.dataset.mode)">📖 Start</button>
                            <button class="btn-deck-reset" data-mode="${mode}" onclick="resetDeckProgress(this.dataset.mode)">↺ Reset</button>
                        </div>
                    </div>`;
                    total    += data.total;
                    due      += data.due_today;
                    mastered += data.mastered;
                }
                container.innerHTML = html;
                document.getElementById('sidebar-total').textContent    = total;
                document.getElementById('sidebar-due').textContent      = due;
                document.getElementById('sidebar-mastered').textContent = mastered;
            } catch (err) {
                container.innerHTML = `<div class="loading">Error: ${esc(err.message)}</div>`;
            }
        }

        async function resetDeckProgress(mode) {
            const name = getModeDisplay(mode);
            if (!confirm(`Reset progress for "${name}"?\n\nThis will clear all review history for this deck only. Other decks are unaffected.\n\nThis cannot be undone.`)) return;
            try {
                const resp = await fetch('/api/reset-deck', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({mode})
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Reset failed');
                alert(`✓ ${data.message}\n${data.removed} card${data.removed !== 1 ? 's' : ''} reset.`);
                loadDashboard();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        // ==================== CARD CONTROLS ====================
        function toggleHint() {
            document.getElementById('hintBox').classList.toggle('visible');
        }

        function flipCard() {
            const card = state.session[state.currentIndex];
            const cs   = state.getCardState(card.id);
            // Toggle flip; saved/evaluated cards always stay visible unless explicitly hidden
            if (cs.flipped || cs.saved || cs.evaluation !== null) {
                cs.flipped = false;
                document.getElementById('answerSection').classList.remove('visible');
                const btn = document.getElementById('flipBtn');
                if (btn) btn.textContent = 'Show Answer';
            } else {
                cs.flipped = true;
                document.getElementById('answerSection').classList.add('visible');
                const btn = document.getElementById('flipBtn');
                if (btn) btn.textContent = 'Hide Answer';
            }
        }

        function setDeepMode(deep) {
            const card = state.session[state.currentIndex];
            const cs   = state.getCardState(card.id);
            cs.deepMode = deep;

            const btns = document.querySelectorAll('.mode-toggle-btn');
            btns.forEach((b, i) => b.classList.toggle('active', i === (deep ? 1 : 0)));

            document.getElementById('quickRate').style.display = deep ? 'none' : 'grid';
            document.getElementById('deepMode').classList.toggle('visible', deep);

            if (deep) {
                cs.flipped = true;
                document.getElementById('answerSection').classList.add('visible');
                const btn = document.getElementById('flipBtn');
                if (btn) btn.textContent = 'Hide Answer';
            }
        }

        // ==================== RATING ====================
        async function submitRating(quality) {
            const card = state.session[state.currentIndex];
            const cs   = state.getCardState(card.id);

            // Immediately update button visual state
            const allBtns = document.querySelectorAll('.quick-rate .rate-btn');
            const qMap = [0, 3, 4, 5];
            allBtns.forEach((btn, i) => {
                btn.classList.remove('selected', 'dimmed');
                if (qMap[i] === quality) btn.classList.add('selected');
                else                     btn.classList.add('dimmed');
            });

            const savedMsg = document.getElementById('savedMsg');
            savedMsg.innerHTML = `<div class="rating-saved-msg" style="opacity:0.6"><span class="spinner"></span> Saving...</div>`;

            // Make sure answer section is visible
            cs.flipped = true;
            document.getElementById('answerSection').classList.add('visible');
            const flipBtn = document.getElementById('flipBtn');
            if (flipBtn) flipBtn.textContent = 'Hide Answer';

            try {
                const resp = await fetch('/api/answer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({card_id: card.id, quality})
                });
                if (!resp.ok) throw new Error('Failed to submit rating');
                const data = await resp.json();

                cs.selectedRating = quality;
                cs.answerResponse = data;
                cs.saved          = true;
                cs.error          = null;

                savedMsg.innerHTML = `<div class="rating-saved-msg">✓ Rating saved. Next review: ${esc(data.next_review)}. Use Next → to continue.</div>`;
                updateProgressBar();
            } catch (err) {
                cs.error = 'Failed to save rating: ' + err.message;
                savedMsg.innerHTML = `<div class="rating-error-msg">⚠ ${esc(cs.error)}</div>`;
            }
        }

        // ==================== EVALUATION ====================
        function buildEvalHtml(ev) {
            if (!ev) return '';
            const scoreColor = ev.score >= 4 ? '#4ade80' : ev.score >= 2 ? '#fb923c' : '#e94560';
            let html = `<div class="eval-box">
                <p class="eval-score" style="color:${scoreColor}">Score: ${ev.score}/5</p>
                <p class="eval-feedback">${esc(ev.feedback || '')}</p>`;
            if (ev.missed_points && ev.missed_points.length > 0) {
                html += `<p class="eval-missed-label">Missed points:</p><ul class="eval-missed-list">`;
                ev.missed_points.forEach(p => { html += `<li>${esc(p)}</li>`; });
                html += `</ul>`;
            }
            html += `</div>`;
            return html;
        }

        async function evaluateWithAI() {
            const answerEl = document.getElementById('userAnswer');
            const ans = answerEl ? answerEl.value.trim() : '';
            if (!ans) { alert('Type your answer first'); return; }

            const card = state.session[state.currentIndex];
            const cs   = state.getCardState(card.id);
            cs.userAnswer = ans;

            const resultDiv = document.getElementById('evaluationResult');
            const evalBtn   = document.getElementById('evalBtn');
            const savedMsg  = document.getElementById('savedMsg');

            evalBtn.disabled    = true;
            evalBtn.textContent = '⏳ Evaluating...';
            resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span> AI is evaluating your answer...</div>';

            try {
                // Step 1: get evaluation
                const evalResp = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({card, user_answer: ans})
                });
                if (!evalResp.ok) throw new Error('Evaluation request failed');
                const result = await evalResp.json();
                if (result.error) throw new Error(result.error);

                cs.evaluation = result;
                resultDiv.innerHTML = buildEvalHtml(result);

                // Step 2: save score to progress
                const answerResp = await fetch('/api/answer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({card_id: card.id, quality: result.score})
                });
                if (!answerResp.ok) throw new Error('Failed to save score');
                const answerData = await answerResp.json();

                cs.selectedRating = result.score;
                cs.answerResponse = answerData;
                cs.saved          = true;
                cs.error          = null;

                savedMsg.innerHTML = `<div class="rating-saved-msg">✓ Score ${result.score}/5 saved. Next review: ${esc(answerData.next_review)}. Use Next → to continue.</div>`;
                updateProgressBar();

            } catch (err) {
                cs.error = err.message;
                resultDiv.innerHTML = `<div class="rating-error-msg">⚠ Evaluation failed: ${esc(err.message)}</div>`;
            } finally {
                evalBtn.disabled    = false;
                evalBtn.textContent = '🤖 Evaluate with AI';
            }
        }

        // ==================== CHAT ====================
        function buildChatHistoryHtml(chat) {
            if (!chat || chat.length === 0) {
                return '<div class="chat-empty">No messages yet. Ask a question below.</div>';
            }
            return chat.map(msg => {
                const cls   = msg.role === 'user' ? 'user' : 'assistant';
                const label = msg.role === 'user' ? 'You' : '🤖 AI Tutor';
                return `<div class="chat-message ${cls}">
                    <div class="chat-role">${label}</div>
                    <div class="chat-content">${esc(msg.content)}</div>
                </div>`;
            }).join('');
        }

        function sendQuickChat(text) {
            const input = document.getElementById('chatInput');
            if (input) {
                input.value = text;
                sendChatMessage();
            }
        }

        async function sendChatMessage() {
            const input   = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            if (!input || !sendBtn) return;

            const message = input.value.trim();
            if (!message) return;

            const card = state.session[state.currentIndex];
            const cs   = state.getCardState(card.id);

            // Append user message to state immediately
            cs.chat.push({role: 'user', content: message});
            input.value = '';

            sendBtn.disabled    = true;
            sendBtn.textContent = '...';

            // Optimistically render user message
            const historyEl = document.getElementById('chatHistory');
            if (historyEl) {
                historyEl.innerHTML = buildChatHistoryHtml(cs.chat);
                historyEl.scrollTop = historyEl.scrollHeight;
            }

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        card,
                        user_message: message,
                        history: cs.chat.slice(0, -1),   // history without the just-pushed message
                        user_answer: cs.userAnswer || null,
                        evaluation:  cs.evaluation || null
                    })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Chat request failed');

                cs.chat.push({role: 'assistant', content: data.reply});
            } catch (err) {
                cs.chat.push({role: 'assistant', content: `⚠ Error: ${esc(err.message)}`});
            } finally {
                if (historyEl) {
                    historyEl.innerHTML = buildChatHistoryHtml(cs.chat);
                    historyEl.scrollTop = historyEl.scrollHeight;
                }
                sendBtn.disabled    = false;
                sendBtn.textContent = 'Send';
            }
        }

        // ==================== PROGRESS BAR ====================
        function updateProgressBar() {
            const total    = state.session.length;
            const reviewed = state.getReviewedCount();
            const pct      = total > 0 ? (reviewed / total) * 100 : 0;
            document.getElementById('sessionProgressFill').style.width = pct + '%';
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
