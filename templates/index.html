<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyForge 🧠</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eaeaea;
            line-height: 1.6;
            display: flex;
            height: 100vh;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 280px;
            background: #16213e;
            border-right: 2px solid #0f3460;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0f3460;
        }

        .sidebar-logo {
            font-size: 2rem;
            font-weight: 900;
            color: #e94560;
            margin-bottom: 8px;
        }

        .sidebar-title {
            font-size: 0.9rem;
            color: #b0b0b0;
        }

        .nav-section {
            margin-bottom: 30px;
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
            font-size: 0.95rem;
            border: 2px solid transparent;
        }

        .nav-item:hover {
            background: #0f3460;
            border-color: #e94560;
        }

        .nav-item.active {
            background: #e94560;
            color: #1a1a2e;
            font-weight: 600;
        }

        .sidebar-stats {
            margin-top: auto;
            padding-top: 20px;
            border-top: 2px solid #0f3460;
            font-size: 0.85rem;
            color: #b0b0b0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #e94560;
            font-weight: 600;
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* ==================== DASHBOARD PAGE ==================== */
        .dashboard-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .app-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-subtitle {
            font-size: 1rem;
            color: #b0b0b0;
        }

        .modes-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .mode-card {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .mode-card:hover {
            border-color: #e94560;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(233, 69, 96, 0.2);
        }

        .mode-card-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #e94560;
        }

        .mode-card-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 0.95rem;
            color: #b0b0b0;
            border-bottom: 1px solid #0f3460;
        }

        .mode-card-stat:last-of-type {
            border-bottom: none;
        }

        .mode-card-stat-value {
            color: #eaeaea;
            font-weight: 600;
        }

        .progress-bar {
            height: 6px;
            background: #0f3460;
            border-radius: 3px;
            margin: 16px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #e94560 100%);
            transition: width 0.3s ease;
        }

        .mode-card-button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: #0f3460;
            border: none;
            color: #eaeaea;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-card-button:hover {
            background: #e94560;
            transform: scale(1.02);
        }

        /* ==================== STUDY PAGE ==================== */
        .study-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0f3460;
        }

        .study-info {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .study-mode {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e94560;
        }

        .study-progress-text {
            font-size: 0.95rem;
            color: #b0b0b0;
        }

        .back-btn {
            background: none;
            border: none;
            color: #b0b0b0;
            font-size: 1rem;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 8px 16px;
            border-radius: 6px;
        }

        .back-btn:hover {
            color: #e94560;
            background: #0f3460;
        }

        .session-progress-bar {
            height: 8px;
            background: #0f3460;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .session-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #e94560 100%);
        }

        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
        }

        .card-box {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-question {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .card-code {
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 6px;
            padding: 16px;
            margin: 20px 0;
            overflow-x: auto;
        }

        .card-code pre {
            margin: 0;
            font-size: 0.85rem;
        }

        .card-hint {
            background: #0f3460;
            padding: 12px 16px;
            border-left: 4px solid #fb923c;
            border-radius: 4px;
            font-style: italic;
            color: #b0b0b0;
            margin: 16px 0;
            display: none;
        }

        .card-hint.visible {
            display: block;
        }

        .card-controls {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-hint {
            background: #0f3460;
            color: #fb923c;
        }

        .btn-hint:hover {
            background: #fb923c;
            color: #1a1a2e;
        }

        .btn-flip {
            background: #e94560;
            color: #eaeaea;
            flex: 2;
        }

        .btn-flip:hover {
            background: #ff6b7f;
        }

        .card-answer {
            background: #0f3460;
            border-top: 2px solid #e94560;
            padding: 20px;
            margin-top: 20px;
            border-radius: 6px;
            display: none;
        }

        .card-answer.visible {
            display: block;
        }

        .card-answer-text {
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            border-bottom: 2px solid #16213e;
            padding-bottom: 16px;
        }

        .mode-toggle-btn {
            flex: 1;
            padding: 10px;
            background: #16213e;
            border: 2px solid #0f3460;
            color: #b0b0b0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .mode-toggle-btn.active {
            background: #e94560;
            color: #eaeaea;
            border-color: #e94560;
        }

        .quick-rate {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .rate-btn {
            padding: 12px;
            background: #16213e;
            border: 2px solid #0f3460;
            color: #eaeaea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .rate-btn:hover {
            transform: scale(1.05);
        }

        .rate-btn.again { border-color: #e94560; color: #e94560; }
        .rate-btn.again:hover { background: #e94560; color: #eaeaea; }
        .rate-btn.hard { border-color: #fb923c; color: #fb923c; }
        .rate-btn.hard:hover { background: #fb923c; color: #eaeaea; }
        .rate-btn.good { border-color: #4ade80; color: #4ade80; }
        .rate-btn.good:hover { background: #4ade80; color: #eaeaea; }
        .rate-btn.easy { border-color: #0f3460; color: #0f3460; }
        .rate-btn.easy:hover { background: #0f3460; color: #eaeaea; }

        .deep-mode {
            display: none;
        }

        .deep-mode.visible {
            display: block;
        }

        .deep-mode textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            background: #16213e;
            border: 2px solid #0f3460;
            color: #eaeaea;
            border-radius: 6px;
            font-family: monospace;
            margin-bottom: 12px;
            resize: vertical;
        }

        .btn-evaluate {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            border: 2px solid #e94560;
            color: #e94560;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-evaluate:hover {
            background: #e94560;
            color: #eaeaea;
        }

        /* ==================== COMPLETE PAGE ==================== */
        .complete-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .complete-header {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 30px;
            color: #4ade80;
        }

        .complete-summary {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            margin-bottom: 30px;
        }

        .summary-stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 1.1rem;
        }

        .summary-stat:last-child {
            border-bottom: none;
        }

        .summary-stat-label {
            color: #b0b0b0;
        }

        .summary-stat-value {
            color: #e94560;
            font-weight: 700;
        }

        .complete-breakdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .breakdown-item {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 8px;
            padding: 16px;
        }

        .breakdown-label {
            font-size: 0.85rem;
            color: #b0b0b0;
            margin-bottom: 8px;
        }

        .breakdown-count {
            font-size: 2rem;
            font-weight: 900;
        }

        .breakdown-again .breakdown-count { color: #e94560; }
        .breakdown-hard .breakdown-count { color: #fb923c; }
        .breakdown-good .breakdown-count { color: #4ade80; }
        .breakdown-easy .breakdown-count { color: #0f3460; }

        .complete-buttons {
            display: flex;
            gap: 16px;
            max-width: 500px;
        }

        .btn-primary {
            flex: 1;
            padding: 16px 24px;
            background: #e94560;
            border: none;
            color: #eaeaea;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #ff6b7f;
        }

        .btn-secondary {
            flex: 1;
            padding: 16px 24px;
            background: #0f3460;
            border: 2px solid #e94560;
            color: #e94560;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #e94560;
            color: #eaeaea;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #b0b0b0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #0f3460;
            border-top: 3px solid #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 2px solid #0f3460; }
            .main-content { padding: 20px; }
            .app-title { font-size: 2rem; }
            .modes-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🧠</div>
            <div class="sidebar-title">StudyForge</div>
        </div>
        <div class="nav-section">
            <div class="nav-label">Main</div>
            <div class="nav-item active" onclick="navigateTo('dashboard')">📊 Dashboard</div>
        </div>
        <div class="nav-section" id="study-nav" style="display: none;">
            <div class="nav-label">Study</div>
            <div class="nav-item" onclick="navigateTo('study')">📚 Study Session</div>
            <div class="nav-item" onclick="navigateTo('dashboard')">↩️ Back to Dashboard</div>
        </div>
        <div class="sidebar-stats">
            <div class="stat-row"><span>Total Cards:</span><span class="stat-value" id="sidebar-total">0</span></div>
            <div class="stat-row"><span>Due Today:</span><span class="stat-value" id="sidebar-due">0</span></div>
            <div class="stat-row"><span>Mastered:</span><span class="stat-value" id="sidebar-mastered">0</span></div>
        </div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="page active">
            <div class="dashboard-header">
                <h1 class="app-title">StudyForge 🧠</h1>
                <p class="app-subtitle">Spaced Repetition for Java Core · LLD · HLD</p>
            </div>
            <div class="modes-container" id="modesContainer">
                <div class="loading"><span class="spinner"></span> Loading...</div>
            </div>
        </div>

        <div id="study" class="page">
            <div class="study-header">
                <button class="back-btn" onclick="navigateTo('dashboard')">← Back</button>
                <div class="study-info">
                    <span class="study-mode" id="sessionMode"></span>
                    <span class="study-progress-text">Card <span id="currentCardNum">1</span>/<span id="totalCards">0</span></span>
                </div>
            </div>
            <div class="session-progress-bar">
                <div class="session-progress-fill" id="sessionProgressFill"></div>
            </div>
            <div class="card-container">
                <div class="card-box" id="cardBox"></div>
            </div>
        </div>

        <div id="complete" class="page">
            <div class="complete-container">
                <div class="complete-header">🎉 Session Complete!</div>
                <div class="complete-summary">
                    <div class="summary-stat"><span>Cards Reviewed</span><span class="summary-stat-value" id="completeReviewed">0</span></div>
                    <div class="summary-stat"><span>Average Quality</span><span class="summary-stat-value" id="completeAverage">0.0</span></div>
                    <div class="summary-stat"><span>Time Taken</span><span class="summary-stat-value" id="completeTime">0m</span></div>
                </div>
                <div class="complete-breakdown">
                    <div class="breakdown-item breakdown-again"><div class="breakdown-label">Again</div><div class="breakdown-count" id="breakdownAgain">0</div></div>
                    <div class="breakdown-item breakdown-hard"><div class="breakdown-label">Hard</div><div class="breakdown-count" id="breakdownHard">0</div></div>
                    <div class="breakdown-item breakdown-good"><div class="breakdown-label">Good</div><div class="breakdown-count" id="breakdownGood">0</div></div>
                    <div class="breakdown-item breakdown-easy"><div class="breakdown-label">Easy</div><div class="breakdown-count" id="breakdownEasy">0</div></div>
                </div>
                <div class="complete-buttons">
                    <button class="btn-primary" onclick="state.restartSession()">Study Again</button>
                    <button class="btn-secondary" onclick="navigateTo('dashboard')">← Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            currentMode: null, session: [], currentIndex: 0, sessionResults: [],
            isFlipped: false, deepMode: false, startTime: null,

            restartSession() { this.startSession(this.currentMode); },

            async startSession(mode) {
                this.currentMode = mode;
                this.session = [];
                this.currentIndex = 0;
                this.sessionResults = [];
                this.isFlipped = false;
                this.startTime = Date.now();

                navigateTo('study');
                document.getElementById('sessionMode').textContent = getModeDisplay(mode);
                document.getElementById('study-nav').style.display = 'block';

                try {
                    const resp = await fetch(`/api/session/${mode}`);
                    if (!resp.ok) throw new Error('Failed to load session');
                    this.session = await resp.json();

                    if (this.session.length === 0) {
                        alert('No cards due for this mode!');
                        navigateTo('dashboard');
                        return;
                    }

                    document.getElementById('totalCards').textContent = this.session.length;
                    this.renderCard();
                } catch (err) {
                    alert('Error: ' + err.message);
                    navigateTo('dashboard');
                }
            },

            renderCard() {
                if (this.currentIndex >= this.session.length) {
                    this.completeSession();
                    return;
                }

                const card = this.session[this.currentIndex];
                document.getElementById('currentCardNum').textContent = this.currentIndex + 1;

                const boxHtml = `
                    <div class="card-question">${esc(card.question)}</div>
                    ${card.code ? `<div class="card-code"><pre><code>${esc(card.code)}</code></pre></div>` : ''}
                    <div class="card-hint" id="hintBox">${esc(card.hint || 'No hint')}</div>
                    <div class="card-controls">
                        <button class="btn btn-hint" onclick="toggleHint()">📌 Hint</button>
                        <button class="btn btn-flip" onclick="flipCard()">Flip Card</button>
                    </div>
                    <div class="card-answer" id="answerSection">
                        <div class="card-answer-text">${esc(card.answer)}</div>
                        <div class="mode-toggle">
                            <button class="mode-toggle-btn active" onclick="setDeepMode(false)">Quick Rate</button>
                            <button class="mode-toggle-btn" onclick="setDeepMode(true)">Deep Mode (AI)</button>
                        </div>
                        <div class="quick-rate" id="quickRate">
                            <button class="rate-btn again" onclick="submitRating(0)">🔴 Again</button>
                            <button class="rate-btn hard" onclick="submitRating(3)">🟠 Hard</button>
                            <button class="rate-btn good" onclick="submitRating(4)">🟢 Good</button>
                            <button class="rate-btn easy" onclick="submitRating(5)">🔵 Easy</button>
                        </div>
                        <div class="deep-mode" id="deepMode">
                            <textarea id="userAnswer" placeholder="Type your answer..."></textarea>
                            <button class="btn-evaluate" onclick="evaluateWithAI()">Evaluate</button>
                            <div id="evaluationResult"></div>
                        </div>
                    </div>
                `;

                document.getElementById('cardBox').innerHTML = boxHtml;
                this.isFlipped = false;

                if (card.code) {
                    setTimeout(() => {
                        document.querySelectorAll('.card-code code').forEach(b => hljs.highlightElement(b));
                    }, 0);
                }

                updateProgressBar();
            },

            async nextCard() {
                this.currentIndex++;
                this.renderCard();
            },

            completeSession() {
                const stats = this.calculateStats();
                document.getElementById('completeReviewed').textContent = this.sessionResults.length;
                document.getElementById('completeAverage').textContent = stats.avgQuality.toFixed(1);
                document.getElementById('completeTime').textContent = formatTime(stats.timeMs);
                document.getElementById('breakdownAgain').textContent = stats.counts[0];
                document.getElementById('breakdownHard').textContent = stats.counts[3];
                document.getElementById('breakdownGood').textContent = stats.counts[4];
                document.getElementById('breakdownEasy').textContent = stats.counts[5];
                navigateTo('complete');
            },

            calculateStats() {
                const results = this.sessionResults;
                if (results.length === 0) return { avgQuality: 0, timeMs: 0, counts: [0,0,0,0,0,0] };
                const timeMs = Date.now() - this.startTime;
                const sum = results.reduce((a, q) => a + q, 0);
                const counts = [0,0,0,0,0,0];
                results.forEach(q => counts[q]++);
                return { avgQuality: sum / results.length, timeMs, counts };
            }
        };

        function navigateTo(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
            
            if (pageName === 'dashboard') {
                document.getElementById('study-nav').style.display = 'none';
                loadDashboard();
            }
        }

        async function loadDashboard() {
            const container = document.getElementById('modesContainer');
            try {
                const resp = await fetch('/api/stats');
                const stats = await resp.json();
                let html = '', total = 0, due = 0, mastered = 0;
                
                for (const [mode, data] of Object.entries(stats)) {
                    const pct = data.total > 0 ? (data.mastered / data.total) * 100 : 0;
                    html += `<div class="mode-card">
                        <div class="mode-card-title">${esc(data.name)}</div>
                        <div class="mode-card-stat"><span>Total</span><span class="mode-card-stat-value">${data.total}</span></div>
                        <div class="mode-card-stat"><span>Due Today</span><span class="mode-card-stat-value">${data.due_today}</span></div>
                        <div class="mode-card-stat"><span>Mastered</span><span class="mode-card-stat-value">${data.mastered}</span></div>
                        <div class="mode-card-stat"><span>Unseen</span><span class="mode-card-stat-value">${data.unseen}</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
                        <button class="mode-card-button" onclick="state.startSession('${mode}')">📖 Start</button>
                    </div>`;
                    total += data.total;
                    due += data.due_today;
                    mastered += data.mastered;
                }
                container.innerHTML = html;
                document.getElementById('sidebar-total').textContent = total;
                document.getElementById('sidebar-due').textContent = due;
                document.getElementById('sidebar-mastered').textContent = mastered;
            } catch (err) {
                container.innerHTML = `<div class="loading">Error: ${err.message}</div>`;
            }
        }

        function getModeDisplay(mode) {
            const m = {'java_core': 'Java Core', 'lld': 'LLD Patterns', 'hld': 'HLD Concepts'};
            return m[mode] || mode.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function toggleHint() { document.getElementById('hintBox').classList.toggle('visible'); }
        function flipCard() {
            state.isFlipped = !state.isFlipped;
            document.getElementById('answerSection').classList.toggle('visible', state.isFlipped);
        }

        function setDeepMode(deep) {
            state.deepMode = deep;
            document.querySelectorAll('.mode-toggle-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('quickRate').style.display = deep ? 'none' : 'grid';
            document.getElementById('deepMode').classList.toggle('visible', deep);
        }

        async function submitRating(quality) {
            const card = state.session[state.currentIndex];
            try {
                const resp = await fetch('/api/answer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({card_id: card.id, quality: quality})
                });
                if (!resp.ok) throw new Error('Failed to submit');
                state.sessionResults.push(quality);
                updateProgressBar();
                setTimeout(() => state.nextCard(), 1500);
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function evaluateWithAI() {
            const ans = document.getElementById('userAnswer').value.trim();
            if (!ans) { alert('Type your answer first'); return; }
            const card = state.session[state.currentIndex];
            const resultDiv = document.getElementById('evaluationResult');
            resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>Evaluating...</div>';
            try {
                const resp = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({card: card, user_answer: ans})
                });
                if (!resp.ok) throw new Error('Evaluation failed');
                const result = await resp.json();
                let html = `<p><strong>Score: ${result.score}/5</strong></p><p>${esc(result.feedback)}</p>`;
                if (result.missed_points && result.missed_points.length > 0) {
                    html += `<p><strong>Missed:</strong><ul>`;
                    result.missed_points.forEach(p => { html += `<li>${esc(p)}</li>`; });
                    html += `</ul></p>`;
                }
                resultDiv.innerHTML = html;
                setTimeout(() => {
                    state.sessionResults.push(result.score);
                    updateProgressBar();
                    setTimeout(() => state.nextCard(), 1500);
                }, 2000);
            } catch (err) {
                resultDiv.innerHTML = `<p style="color:#e94560;">Error: ${err.message}</p>`;
            }
        }

        function updateProgressBar() {
            const total = state.session.length;
            const completed = state.currentIndex;
            const pct = total > 0 ? (completed / total) * 100 : 0;
            document.getElementById('sessionProgressFill').style.width = pct + '%';
        }

        function formatTime(ms) {
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            return min === 0 ? `${sec}s` : `${min}m ${sec}s`;
        }

        function esc(text) {
            const m = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, c => m[c]);
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
